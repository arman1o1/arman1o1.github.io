<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1200" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#070a13"/>
      <stop offset="50%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020408"/>
    </linearGradient>
    <linearGradient id="mazeLines" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#64ffda"/>
      <stop offset="50%" stop-color="#00b4d8"/>
      <stop offset="100%" stop-color="#0077b6"/>
    </linearGradient>
    <filter id="neon" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="1200" fill="url(#bgGrad)"/>

  <!-- City-Labyrinth Maze Structure (No Text) -->
  <g transform="translate(400, 600)" fill="none" stroke="url(#mazeLines)" stroke-linecap="round" stroke-linejoin="round" filter="url(#neon)">
    
    <!-- Outer boundary square -->
    <rect x="-350" y="-350" width="700" height="700" stroke-width="4" rx="10"/>

    <!-- Center target (The subconscious core / Red dot) -->
    <circle cx="0" cy="0" r="12" fill="#ff7675" stroke="none"/>
    <circle cx="0" cy="0" r="30" stroke="#ff7675" stroke-width="2" stroke-dasharray="4 4"/>

    <!-- Labyrinth Walls configured as skyscraper outlines (steps, blocks, towers) -->
    
    <!-- Ring 1 (Inner - 80px) -->
    <path d="M -80,-80 L -80,-30 M -80,30 L -80,80 L -30,80 M 30,80 L 80,80 L 80,-80 L 30,-80" stroke-width="3"/>
    
    <!-- Ring 2 (140px) -->
    <path d="M -140,-140 L -60,-140 M 60,-140 L 140,-140 L 140,-60 M 140,60 L 140,140 L -140,140 L -140,60" stroke-width="3"/>
    <!-- Connecting walls -->
    <path d="M -140,-60 L -80,-60 M -60,-140 L -60,-80" stroke-width="2.5"/>

    <!-- Ring 3 (200px) -->
    <path d="M -200,-200 L -200,100 M -200,160 L -200,200 L 200,200 L 200,-200 L -100,-200" stroke-width="3"/>
    <!-- Intricate city block maze details -->
    <path d="M -200,0 L -140,0 M -100,-200 L -100,-140 M -200,100 L -140,100 M 0,200 L 0,140" stroke-width="2.5"/>
    <path d="M 200,100 L 140,100 M 200,-100 L 140,-100 M 100,-200 L 100,-140" stroke-width="2.5"/>

    <!-- Ring 4 (270px) -->
    <path d="M -270,-270 L 180,-270 M 240,-270 L 270,-270 L 270,270 L -270,270 L -270,-180" stroke-width="3"/>
    <!-- Tower skyline protrusions acting as maze walls -->
    <!-- Left tower -->
    <path d="M -270,-100 L -230,-100 L -230,-60 L -270,-60" stroke-width="2"/>
    <!-- Bottom tower -->
    <path d="M -150,270 L -150,220 L -90,220 L -90,270" stroke-width="2"/>
    <!-- Right tower -->
    <path d="M 270,50 L 220,50 L 220,120 L 270,120" stroke-width="2"/>
    <!-- Top tower -->
    <path d="M 50,-270 L 50,-210 L 120,-210 L 120,-270" stroke-width="2"/>

    <!-- Extra connector paths (Making the maze solvable yet highly complex) -->
    <line x1="-270" y1="-180" x2="-200" y2="-180" stroke-width="2.5"/>
    <line x1="-200" y1="-270" x2="-200" y2="-200" stroke-width="2.5"/>
    <line x1="270" y1="-180" x2="200" y2="-180" stroke-width="2.5"/>
    <line x1="200" y1="200" x2="200" y2="270" stroke-width="2.5"/>
    <line x1="-200" y1="200" x2="-200" y2="270" stroke-width="2.5"/>
  </g>
</svg>
